<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Filmes Populares | TMDB</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <header class="topo">
        <h1>Top 10 Filmes de Hoje</h1>
        <button class="theme-btn" id="themeToggle" aria-label="Alternar tema">🌓</button>
    </header>

    <main>
        <section id="catalogo" class="catalogo"></section>
    </main>

    <div class="paginacao">
        <button id="prevBtn" class="page-btn">←</button>
        <span id="pageInfo">Página 1</span>
        <button id="nextBtn" class="page-btn">→</button>
    </div>


    <!-- Modal para detalhes completos -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-poster">
                    <img id="modalPoster" src="" alt="Poster do filme">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <div id="modalGenres" class="modal-genres"></div>
                    <div class="modal-rating">
                        <span class="stars" id="modalStars">⭐</span>
                        <span id="modalVote"></span>
                    </div>
                    <div class="modal-date">
                        <span id="modalRelease"></span>
                    </div>
                    <div class="modal-synopsis">
                        <strong>Sinopse</strong><br>
                        <span id="modalOverview"></span>
                    </div>
                    <button class="close-modal" id="closeModalBtn">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Dados fornecidos por The Movie Database (TMDB) • Clique em qualquer filme para ver mais detalhes<br><br>
        © 2026 Mateus Rezende Machado. Todos os direitos reservados.
        </p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
